<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiva Maniam</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 2.5rem;
      letter-spacing: 0.5px;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #333;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
    }

    .links a:hover {
      border-color: #888;
      color: #ffffff;
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: #333;
      margin: 3rem auto;
    }

    .portfolio {
      text-align: left;
      max-width: 480px;
      width: 100%;
    }

    .portfolio h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 1.2rem;
    }

    .project {
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1.1rem 1.3rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s;
    }

    .project:hover {
      border-color: #555;
    }

    .project-title {
      font-size: 0.95rem;
      color: #e0e0e0;
      margin-bottom: 0.3rem;
    }

    .project-desc {
      font-size: 0.82rem;
      color: #666;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shiva Maniam</h1>
    <p class="subtitle">Data Scientist</p>
    <div class="links">
      <a href="https://shivmaniam.substack.com/" target="_blank" rel="noopener">Substack</a>
      <a href="https://www.linkedin.com/in/smaniam/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/shivmaniam/" target="_blank" rel="noopener">GitHub</a>
    </div>
    <div class="divider"></div>

    <div class="portfolio">
      <h2>Portfolio</h2>
      <a class="project" href="https://similar-soccer-player-search.streamlit.app/" target="_blank" rel="noopener">
        <div class="project-title">Similar Soccer Player Search</div>
        <div class="project-desc">Find soccer players with similar stats and playing styles.</div>
      </a>
    </div>
  </div>
</body>
</html>
