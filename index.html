<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiva Maniam</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 2.5rem;
      letter-spacing: 0.5px;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #333;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
    }

    .links a:hover {
      border-color: #888;
      color: #ffffff;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shiva Maniam</h1>
    <p class="subtitle">Data Scientist</p>
    <div class="links">
      <a href="https://shivmaniam.substack.com/" target="_blank" rel="noopener">Substack</a>
      <a href="https://www.linkedin.com/in/smaniam/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/shivmaniam/" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</body>
</html>
